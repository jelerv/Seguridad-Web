version: '3.8'

services:
  # ====================== APPS OFICIALES VULNERABLES ======================
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    ports:
      - "3000:3000"
    restart: unless-stopped

  crapi:
    image: crapi/crapi-community:develop
    container_name: crapi
    ports:
      - "8888:8888"
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=dvwa-db
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=dvwa
      - MYSQL_DB=dvwa
    depends_on:
      - dvwa-db
    restart: unless-stopped

  dvwa-db:
    image: mysql:8.0
    container_name: dvwa-db
    environment:
      - MYSQL_ROOT_PASSWORD=p@ssw0rd
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=dvwa
    volumes:
      - dvwa-db-data:/var/lib/mysql
    restart: unless-stopped

  # ====================== APPS DEL CURSO (por módulo) ======================

  # Módulo 03 - Broken Access Control
  vulnerable-broken-access:
    build: ./modules/03-broken-access-control/vulnerable
    container_name: vulnerable-broken-access
    ports:
      - "5003:5000"
    restart: unless-stopped

  secure-broken-access:
    build: ./modules/03-broken-access-control/secure
    container_name: secure-broken-access
    ports:
      - "5004:5000"
    restart: unless-stopped

 # Módulo 04 - Security Misconfiguration
  vulnerable-misconfig:
    build: ./modules/04-security-misconfiguration/vulnerable
    container_name: vulnerable-misconfig
    ports:
      - "5005:5000"
    restart: unless-stopped

  secure-misconfig:
    build: ./modules/04-security-misconfiguration/secure
    container_name: secure-misconfig
    ports:
      - "5006:5000"
    restart: unless-stopped

# Módulo 05 - Vulnerable Supply Chain
  vulnerable-supply-chain:
    build: ./modules/05-software-supply-chain/vulnerable
    container_name: vulnerable-supply-chain
    ports:
      - "5007:5000"
    restart: unless-stopped

  secure-supply-chain:
    build: ./modules/05-software-supply-chain/secure
    container_name: secure-supply-chain
    ports:
      - "5008:5000"
    restart: unless-stopped

 # Módulo 06 - Cryptografics Failures
  vulnerable-crypto:
    build: ./modules/06-cryptographic-failures/vulnerable
    container_name: vulnerable-crypto
    ports:
      - "5009:5000"
    restart: unless-stopped

  secure-crypto:
    build: ./modules/06-cryptographic-failures/secure
    container_name: secure-crypto
    ports:
      - "5010:5000"
    restart: unless-stopped
      
  # Módulo 07 - Injection
  vulnerable-injection:
    build: ./modules/07-injection/vulnerable
    container_name: vulnerable-injection
    ports:
      - "5001:5000"
    restart: unless-stopped

  secure-injection:
    build: ./modules/07-injection/secure
    container_name: secure-injection
    ports:
      - "5002:5000"
    restart: unless-stopped

  # Puedes agregar más módulos aquí cuando los crees (ejemplo placeholders)
  # vulnerable-broken-access:
  #   build: ./modules/03-broken-access-control/vulnerable
  #   ports:
  #     - "5003:5000"

  # Módulo 08 - Insecure Design
  vulnerable-insecure-design:
    build: ./modules/08-insecure-design/vulnerable
    container_name: vulnerable-insecure-design
    ports:
      - "5011:5000"
    restart: unless-stopped

  secure-insecure-design:
    build: ./modules/08-insecure-design/secure
    container_name: secure-insecure-design
    ports:
      - "5012:5000"
    restart: unless-stopped
 
  # Módulo 09 - Identification Auth Failures
  vulnerable-auth:
    build: ./modules/09-identification-auth-failures/vulnerable
    container_name: vulnerable-auth
    ports:
      - "5011:5000"
    restart: unless-stopped

  secure-auth:
    build: ./modules/09-identification-auth-failures/secure
    container_name: secure-auth
    ports:
      - "5012:5000"
    restart: unless-stopped

  # Módulo 10 - A08, A09, A10:2025 + Seguridad Avanzada en APIs
  vulnerable-api-advanced:
    build: ./modules/10-a08-a09-a10-api-avanzado/vulnerable
    container_name: vulnerable-api-advanced
    ports:
      - "5013:5000"
    restart: unless-stopped

  secure-api-advanced:
    build: ./modules/10-a08-a09-a10-api-avanzado/secure
    container_name: secure-api-advanced
    ports:
      - "5014:5000"
    restart: unless-stopped


volumes:
  dvwa-db-data:
